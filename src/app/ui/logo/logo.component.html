<a class="logo" aria-label="Logo  - Enrico Hoffmann" [class.is-hovered]="hoverable"  [style.width.px]="width ?? null" [style.height.px]="height" [routerLink]="[]" [fragment]="targetFragment">

    @if(variant == 'auto' || variant == 'full') {
        <span class="logo-full"></span>
    }

    @if (variant == 'auto' || variant == 'outline') {
        <span class="logo-outline" [class.only-outline]="variant == 'outline'"></span>
    }

    @if(variant === 'small') {
        <span class="logo-small"></span>
    }

    
</a>
